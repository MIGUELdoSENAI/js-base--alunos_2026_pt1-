<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterando estilos com o DOM</title>


    <h1>
        <strong>
            <p> Oi meu nome é russel </p>
        </strong>
    </h1>

    <link rel="stylesheet" href="style.css">

    <!-- CSS interno -->
     <style>

        :root {
            --cor-primaria: #000000;
            --cor-secundaria: #ffffff;
        }
        body.dark-mode {
            --cor-primaria: #ffffff;
            --cor-secundaria: #000000;
        }

         body {
            background-color: var(--cor-secundaria);
            color: var(--cor-primaria);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #minhaDiv {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            margin-top: 200px;
        }

        h1 {
            text-align: center;
        }
            button {
                display: block;
                margin: 20px auto;
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
            }
     </style>


</head>
<body>

    <!--Botão para mudar a cor da div -->
    <button id="meuBotao">Mudar Cor</button>
    <button id="mudarTema">Mudar Tema</button>

    <!-- Div que tera sua cor de fundo alterada via dom no JS-->
     <div id="minhaDiv"></div>

    <!-- JS interno -->
    <script>
        // Seleção (Botão e Div) usando DOM no JS
        const botao = document.querySelector('#meuBotao')
        const div = document.querySelector('#minhaDiv')
        const toggleButton = document.querySelector('#mudarTema')


        // Adição de evento (clique) para monitorar
        botao.addEventListener('click', () => {
            // verificar cor atual e troca entre (lightblue e lightcoral)
            if (div.style.backgroundColor === 'lightblue') {
                div.style.backgroundColor = 'lightcoral'
            } else {
                div.style.backgroundColor = 'lightblue'
            }
        })


        // Adição de evento mudar tema
        toggleButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode')
        })

    </script>

<script src="script.js"></script>

</body>
</html>
