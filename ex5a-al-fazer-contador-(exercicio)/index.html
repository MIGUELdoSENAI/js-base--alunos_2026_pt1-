<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5: Contador</title>

  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
    }

    #counter {
      font-size: 48px;
      margin-bottom: 20px;
      padding: 10px 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <p id="counter">0</p>
  <button id="myButton">Clique aqui</button>

  <script>
    // pego o botao e o paragrafo pelo id
    var botao = document.querySelector('#myButton');
    var contador = document.querySelector('#counter');

    // variavel que guarda o numero de cliques
    var cliques = 0;

    // quando o botao for clicado
    botao.addEventListener('click', function() {
      // incrementa o contador
      cliques = cliques + 1;

      // atualiza o texto do paragrafo
      contador.innerHTML = cliques;

      // verifica se o numero e par ou impar
      if (cliques % 2 == 0) {
        // se for par, fundo verde
        contador.style.backgroundColor = 'green';
      } else {
        // se for impar, fundo vermelho
        contador.style.backgroundColor = 'red';
      }
    });
  </script>

</body>
</html>
