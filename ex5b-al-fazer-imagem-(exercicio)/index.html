<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5b: Troca de Imagem</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .image-container {
      text-align: center;
    }

    img {
      width: 200px;
      height: 200px;
      border: 2px solid black;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05);
    }

    #myText {
      margin-top: 20px;
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
    }

    .subtext {
      margin-top: 10px;
      font-size: 1.2em;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="image-container">
    <img id="myImage" src="image.png" alt="Imagem 1">
    <p id="myText">Passe o mouse sobre a imagem</p>
    <p class="subtext" id="subText">Sabrina Carpenter - Linda!</p>
  </div>

  <script>
    // pego a imagem e os textos pelo id
    var imagem = document.querySelector('#myImage');
    var texto = document.querySelector('#myText');
    var subTexto = document.querySelector('#subText');

    // quando o mouse passar em cima da imagem
    imagem.addEventListener('mouseover', function() {
      // troca a imagem
      imagem.src = 'image2.png';

      // muda os textos
      texto.innerHTML = 'Imagem alterada!';
      subTexto.innerHTML = 'Sabrina Carpenter - Espetacular!';
    });

    // quando o mouse sair da imagem
    imagem.addEventListener('mouseout', function() {
      // volta para a imagem original
      imagem.src = 'image.png';

      // volta os textos para o estado inicial
      texto.innerHTML = 'Passe o mouse sobre a imagem';
      subTexto.innerHTML = 'Sabrina Carpenter - Linda!';
    });
  </script>

</body>
</html>
