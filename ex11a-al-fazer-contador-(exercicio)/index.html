<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div id="timer">0</div>

  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <script>
    // pego o timer e os botoes pelo id
    var timer = document.querySelector('#timer');
    var startButton = document.querySelector('#startButton');
    var pauseButton = document.querySelector('#pauseButton');
    var resetButton = document.querySelector('#resetButton');

    // variavel que guarda o numero de segundos
    var segundos = 0;

    // variavel que guarda o intervalo
    var intervalo = null;

    // botao iniciar
    startButton.addEventListener('click', function() {
      // evita criar varios intervalos ao clicar varias vezes
      if (intervalo != null) {
        return;
      }

      // incrementa o contador a cada 1 segundo
      intervalo = setInterval(function() {
        segundos = segundos + 1;
        timer.innerHTML = segundos;
      }, 1000);
    });

    // botao pausar
    pauseButton.addEventListener('click', function() {
      // para o intervalo
      clearInterval(intervalo);
      intervalo = null;
    });

    // botao resetar
    resetButton.addEventListener('click', function() {
      // para o intervalo e zera o contador
      clearInterval(intervalo);
      intervalo = null;
      segundos = 0;
      timer.innerHTML = 0;
    });
  </script>

</body>
</html>
