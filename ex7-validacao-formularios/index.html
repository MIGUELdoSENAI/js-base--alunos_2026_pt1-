<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validação de Formulário</title>
  <style>
    .error {
      color: red;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <form id="signupForm">
    <div>
      <label for="name">Nome:</label>
      <input type="text" id="name" name="name">
      <span class="error" id="nameError"></span>
    </div>
    <div>
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email">
      <span class="error" id="emailError"></span>
    </div>
    <div>
      <label for="password">Senha:</label>
      <input type="password" id="password" name="password">
      <span class="error" id="passwordError"></span>
    </div>
    <button type="submit">Cadastrar</button>
  </form>

  <script>
    // pego o formulario pelo id
    var form = document.querySelector('#signupForm');

    // adiciono o evento de submit no formulario
    form.addEventListener('submit', function(event) {
      // impede o envio padrao do formulario
      event.preventDefault();

      // pego os valores dos campos e tiro os espacos em branco
      var name = document.querySelector('#name').value.trim();
      var email = document.querySelector('#email').value.trim();
      var password = document.querySelector('#password').value.trim();

      // variavel para controlar se o formulario e valido
      var isValid = true;

      // validacao do nome
      if (name === '') {
        document.querySelector('#nameError').textContent = 'Nome é obrigatório.';
        isValid = false;
      } else {
        document.querySelector('#nameError').textContent = '';
      }

      // validacao do e-mail
      if (email === '' || !email.includes('@')) {
        document.querySelector('#emailError').textContent = 'E-mail inválido.';
        isValid = false;
      } else {
        document.querySelector('#emailError').textContent = '';
      }

      // validacao da senha
      if (password.length < 6) {
        document.querySelector('#passwordError').textContent = 'Senha deve ter pelo menos 6 caracteres.';
        isValid = false;
      } else {
        document.querySelector('#passwordError').textContent = '';
      }

      // se tudo estiver certo, mostra mensagem e limpa o formulario
      if (isValid == true) {
        alert('Cadastro realizado com sucesso!');
        form.reset();
      }
    });
  </script>

</body>
</html>
